name: Rule request
description: Propose a new anti mistake rule for Foundry
labels: [rule-request]
body:
  - type: textarea
    id: rule
    attributes:
      label: The rule
      description: The specific mistake and the fix, in one or two sentences.
    validations:
      required: true
  - type: input
    id: evidence
    attributes:
      label: Evidence on the live tool
      description: A doc link or a reproduction showing this is true on the real client. Correctness over confidence.
    validations:
      required: true
  - type: input
    id: leave_alone
    attributes:
      label: Leave alone clause
      description: When should this rule not fire, so it does not flag working code.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Foundry area
      options:
        - principles
        - skills
        - hooks
        - mcp-servers
        - subagents
        - commands
        - context-engineering
        - settings-and-config
        - testing-and-evals
        - security
        - portability
        - anti-patterns
    validations:
      required: true
