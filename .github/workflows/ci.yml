name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # BESTPRACTICE_OK pinned to a 40 char commit sha for v4.3.1, the supply chain rule Foundry teaches

      - name: Shell syntax check
        run: |
          fail=0
          while IFS= read -r s; do
            bash -n "$s" || { echo "syntax error in $s"; fail=1; }
          done < <(find foundry -name '*.sh')
          exit "$fail"

      - name: Shellcheck
        run: |
          if command -v shellcheck >/dev/null 2>&1; then
            find foundry -name '*.sh' -print0 | xargs -0 shellcheck
          else
            echo "shellcheck not present on this runner, skipping"
          fi

      - name: JS launcher parse check
        run: |
          if command -v node >/dev/null 2>&1; then
            for j in bin/*.js; do node --check "$j"; done
          else
            echo "node not present, skipping the js parse check"
          fi

      - name: Doctor
        run: bash foundry/scripts/doctor.sh

      - name: Evals
        run: bash foundry/evals/run-evals.sh

      - name: Integration
        run: bash foundry/evals/integration.sh
